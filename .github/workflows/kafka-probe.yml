name: kafka-probe

# DIAGNOSTIC: confirm WHY the bridge-token read 403'd, with no Vault admin and
# no PII. Uses sys/capabilities-self (a token introspecting its own perms on a
# path — always allowed) to see exactly what our role can read. Prints only
# capabilities, policy names, and HTTP status codes — never any secret value.

on:
  push:
    branches: [kafka-probe]

permissions:
  id-token: write
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Diagnose Vault access for the bridge token
        env:
          VAULT_ADDR: https://vault.yral.com
          ROLE: yral-rishi-analytics-role
          AUD: https://github.com/dolr-ai
        run: |
          set -euo pipefail
          # 1) GitHub OIDC JWT for the Vault audience
          JWT=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=$AUD" | jq -r '.value')
          echo "OIDC JWT acquired (len ${#JWT})"

          # 2) Vault login with our role
          LOGIN=$(curl -sS -X POST "$VAULT_ADDR/v1/auth/jwt/login" \
            -d "{\"role\":\"$ROLE\",\"jwt\":\"$JWT\"}")
          TOKEN=$(echo "$LOGIN" | jq -r '.auth.client_token // empty')
          if [ -z "$TOKEN" ]; then
            echo "VAULT LOGIN FAILED (auth/role/audience problem):"
            echo "$LOGIN" | jq '{errors}'
            exit 1
          fi
          echo "TOKEN_POLICIES=$(echo "$LOGIN" | jq -c '.auth.policies')"

          # 3) capabilities-self — definitive (path -> caps), no value disclosed
          echo "CAPS=$(curl -sS -X POST "$VAULT_ADDR/v1/sys/capabilities-self" \
            -H "X-Vault-Token: $TOKEN" \
            -d '{"paths":["secret/data/SAIKAT_KAFKA_BRIDGE_BEARER_TOKEN","secret/data/yral-rishi-analytics/x"]}' \
            | jq -c 'to_entries|map(select(.key|test("SAIKAT|yral-rishi")))|from_entries')"

          # 4) raw read attempt — HTTP status ONLY, never the body/value
          echo "=== read attempt (status only) ==="
          code=$(curl -sS -o /dev/null -w '%{http_code}' \
            -H "X-Vault-Token: $TOKEN" \
            "$VAULT_ADDR/v1/secret/data/SAIKAT_KAFKA_BRIDGE_BEARER_TOKEN")
          echo "GET secret/data/SAIKAT_KAFKA_BRIDGE_BEARER_TOKEN -> HTTP $code"
